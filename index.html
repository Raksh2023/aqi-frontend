<!DOCTYPE html>
<html>
<head>
  <title>AQI Chatbot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: #1e293b;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #38bdf8;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      color: black;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 70%;
    }

    .user {
      background: #38bdf8;
      align-self: flex-end;
      color: black;
    }

    .bot {
      background: #334155;
      align-self: flex-start;
      color: white;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #0f172a;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">🌱 AQI Assistant</div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input id="msg" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const BASE_URL = "https://aqi-backend.onrender.com"; // 🔥 YOUR BACKEND

function addMessage(text, sender) {
    const chatBox = document.getElementById("chatBox");
    const msgDiv = document.createElement("div");

    msgDiv.classList.add("message", sender);
    msgDiv.innerText = text;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("msg");
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    fetch(`${BASE_URL}/chat`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.response, "bot");
    })
    .catch(() => {
        addMessage("⚠️ Server error. Try again.", "bot");
    });
}

// Enter key support
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
