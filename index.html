<!DOCTYPE html>
<html>
<head>
  <title>Smart AQI Dashboard</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      margin-top: 30px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 100px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }

    .results {
      margin-top: 30px;
    }

    .card {
      display: inline-block;
      margin: 10px;
      padding: 15px;
      background: #222;
      border-radius: 10px;
      width: 200px;
    }

    .chat {
      margin-top: 40px;
    }

    .chat input {
      width: 250px;
    }
  </style>
</head>

<body>

<h1>🌍 Smart Air Quality Dashboard</h1>

<div class="container">
  <input type="number" placeholder="PM2.5">
  <input type="number" placeholder="PM10">
  <input type="number" placeholder="NO2">
  <input type="number" placeholder="SO2">
  <input type="number" placeholder="CO">
  <input type="number" placeholder="O3">

  <br><br>
  <button onclick="analyzeAQI()">Analyze</button>
</div>

<div class="results">
  <div class="card" id="aqi">AQI: -</div>
  <div class="card" id="alert">Alert: -</div>
  <div class="card" id="health">Health: -</div>
  <div class="card" id="advice">Advice: -</div>
</div>

<!-- Chatbot -->
<div class="chat">
  <h3>💬 Ask about Air Quality</h3>
  <input type="text" id="chatInput" placeholder="Ask something...">
  <button onclick="askChat()">Ask</button>

  <p id="chatResponse"></p>
</div>

<script>
async function analyzeAQI() {
  const inputs = document.querySelectorAll("input");

  const data = {
    pm2_5: Number(inputs[0].value) || 0,
    pm10: Number(inputs[1].value) || 0,
    no2: Number(inputs[2].value) || 0,
    so2: Number(inputs[3].value) || 0,
    co: Number(inputs[4].value) || 0,
    o3: Number(inputs[5].value) || 0
  };

  try {
    const res = await fetch("http://127.0.0.1:5002/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.error) {
      alert(result.error);
      return;
    }

    document.getElementById("aqi").innerText = "AQI: " + result.aqi;
    document.getElementById("alert").innerText = "Alert: " + result.alert;
    document.getElementById("health").innerText = "Health: " + result.health;
    document.getElementById("advice").innerText = "Advice: " + result.advice;

  } catch (err) {
    console.error(err);
    alert("⚠ Backend connection failed!");
  }
}

async function askChat() {
  const msg = document.getElementById("chatInput").value;

  try {
    const res = await fetch("http://127.0.0.1:5002/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    document.getElementById("chatResponse").innerText = data.reply;

  } catch (err) {
    console.error(err);
    alert("⚠ Chatbot not working!");
  }
}
</script>

</body>
</html>
