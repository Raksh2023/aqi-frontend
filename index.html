<!DOCTYPE html>
<html>
<head>
    <title>Smart AQI AI Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- MAP -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body { background:black; color:white; font-family:Arial; }
        .container { padding:20px; }
        .card { background:rgba(255,255,255,0.1); padding:10px; margin:5px; display:inline-block; }
    </style>
</head>

<body>

<div class="container">
    <h1>🌍 Smart AQI AI Dashboard</h1>

    <input id="pm25" placeholder="PM2.5">
    <input id="pm10" placeholder="PM10">
    <input id="co" placeholder="CO">
    <input id="city" placeholder="City (e.g. Delhi)">
    <button onclick="analyze()">Analyze</button>

    <div>
        <div class="card">AQI: <span id="aqi"></span></div>
        <div class="card">Health: <span id="health"></span></div>
        <div class="card">Alert: <span id="alert"></span></div>
    </div>

    <canvas id="chart"></canvas>

    <!-- MAP -->
    <div id="map" style="height:300px;"></div>

    <!-- CHAT -->
    <input id="query" placeholder="Ask anything...">
    <button onclick="chat()">Ask</button>
    <p id="response"></p>
</div>

<script>
async function analyze(){
    let res = await fetch("http://localhost:5000/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            pm25:pm25.value,
            pm10:pm10.value,
            co:co.value,
            city:city.value
        })
    });

    let data = await res.json();

    aqi.innerText = data.AQI;
    health.innerText = data.Health;
    alert.innerText = data.Alert;

    updateMap(data.AQI, data.City);
    updateChart(data.AQI);
}

// CHAT
async function chat(){
    let res = await fetch(, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            query:query.value,
            aqi:aqi.innerText
        })
    });

    let data = await res.json();
    response.innerText = data.response;
}

// CHART
let chart = new Chart(document.getElementById("chart"), {
    type:"line",
    data:{labels:[], datasets:[{label:"AQI", data:[]}]}
});

function updateChart(aqi){
    chart.data.labels.push(new Date().toLocaleTimeString());
    chart.data.datasets[0].data.push(aqi);
    chart.update();
}

// MAP
const map = L.map('map').setView([28.61,77.23],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker;
function updateMap(aqi, city){
    if(marker) map.removeLayer(marker);
    marker = L.marker([28.61,77.23]).addTo(map)
        .bindPopup(city + " AQI: " + aqi).openPopup();
}
</script>

</body>
</html>
